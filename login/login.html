<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafeteria Amanhecer dos sonhos</title>
    <link rel="stylesheet" href="/login/login css/login.css" />
    <script src="/login/script-login/login.js" defer></script>
      <link
      rel="shortcut icon"
      href="../img/graos-de-cafe.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="container">
      <!--navegação (parte superior)-->
      <header id="barra-navegacao" ondblclick="fechaAbas()" >
        <figure id="logo-cafe">
          <img src="../img/logo-cafe.png" alt="logo café" />
        </figure>
        <!--Links -->
        <nav id="nav-links">
          <ul>
            <li>Home</li>
            <!--utilizar javascript nas linhas que vão funcionar como abas-->
            <li>Sobre nós</li>
            <li>Nossa estrutura</li>
            <li>Contato</li>
          </ul>
        </nav>
        <!--icones de acesso rápido-->
        <div class="fast-acess">
          <figure id="acesso-rapido">
            <button class="btn-fast-acess" id="pesquisar"><img src="../img/lupa.png" alt="Pesquisar" /></button>
             <div class="opcoes-acesso">
            <button class="btn-fast-acess" id="login-acesso" onclick="opcoesAcesso()" ondblclick="fechaAcesso()" ><img src="../img/user.png" alt="login" /></button>
              <ul id="list-acess">
                <a href="login.html"><li>Login</li></a>
                <a href="cadastro.html"><li>Cadastro</li></a>
                <a href=""><li>Alterar dados</li></a>
              </ul>
            </div>
            <button class="btn-fast-acess" id="compras"><img src="../img/carrinhos.png" alt="meu carrinho" /></button>
          </figure>
        </div>
      </header>

    </div>
  </body>
</html>
